<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="guanxiaol — Make the AI age belong to everyone">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070a"/>
      <stop offset="100%" stop-color="#0c0f14"/>
    </linearGradient>
    <radialGradient id="glow1" cx="18%" cy="28%" r="60%">
      <stop offset="0%" stop-color="#c7ff3a" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#c7ff3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="82%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#22e6ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22e6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="55%" cy="115%" r="80%">
      <stop offset="0%" stop-color="#ff3ec9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff3ec9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c7ff3a"/>
      <stop offset="55%" stop-color="#22e6ff"/>
      <stop offset="100%" stop-color="#ff3ec9"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>
  <rect width="1280" height="360" fill="url(#glow1)"/>
  <rect width="1280" height="360" fill="url(#glow2)"/>
  <rect width="1280" height="360" fill="url(#glow3)"/>

  <!-- corner brackets -->
  <g stroke="rgba(199,255,58,0.5)" stroke-width="1" fill="none">
    <path d="M40 40 H 64 M40 40 V 64"/>
    <path d="M1240 40 H 1216 M1240 40 V 64"/>
    <path d="M40 320 H 64 M40 320 V 296"/>
    <path d="M1240 320 H 1216 M1240 320 V 296"/>
  </g>

  <!-- status pill -->
  <g transform="translate(60 68)">
    <rect width="380" height="22" rx="11" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="14" cy="11" r="3" fill="#c7ff3a"/>
    <text x="26" y="15" fill="#a1a1aa" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="2">
      CLAUDE RESEARCHER · AGENT-ERA BUILDER · OPEN BY DEFAULT
    </text>
  </g>

  <!-- big handle -->
  <text x="60" y="176" fill="url(#title)" font-family="Space Grotesk, Inter, sans-serif" font-weight="800" font-size="104" letter-spacing="-4">guanxiaol</text>

  <!-- manifesto tagline en -->
  <text x="60" y="222" fill="#e4e4e7" font-family="Inter, sans-serif" font-weight="500" font-size="21" letter-spacing="0.2">
    Make the AI age belong to everyone.
  </text>
  <!-- manifesto tagline zh -->
  <text x="60" y="252" fill="#a1a1aa" font-family="Inter, sans-serif" font-weight="400" font-size="18" letter-spacing="0.2">
    AI 的红利，应该属于所有人 · 用最少的成本，做最值得做的事
  </text>

  <!-- chips -->
  <g transform="translate(60 282)" font-family="JetBrains Mono, monospace" font-size="11">
    <g>
      <rect width="118" height="22" rx="11" fill="rgba(199,255,58,0.10)" stroke="rgba(199,255,58,0.35)"/>
      <text x="59" y="15" fill="#c7ff3a" text-anchor="middle">Claude·research</text>
    </g>
    <g transform="translate(130 0)">
      <rect width="98" height="22" rx="11" fill="rgba(34,230,255,0.10)" stroke="rgba(34,230,255,0.35)"/>
      <text x="49" y="15" fill="#22e6ff" text-anchor="middle">ChatGPT·dev</text>
    </g>
    <g transform="translate(240 0)">
      <rect width="92" height="22" rx="11" fill="rgba(255,62,201,0.10)" stroke="rgba(255,62,201,0.35)"/>
      <text x="46" y="15" fill="#ff3ec9" text-anchor="middle">Agent·era</text>
    </g>
    <g transform="translate(344 0)">
      <rect width="116" height="22" rx="11" fill="rgba(255,174,58,0.10)" stroke="rgba(255,174,58,0.35)"/>
      <text x="58" y="15" fill="#ffae3a" text-anchor="middle">anti-monopoly</text>
    </g>
    <g transform="translate(472 0)">
      <rect width="88" height="22" rx="11" fill="rgba(229,229,231,0.08)" stroke="rgba(229,229,231,0.30)"/>
      <text x="44" y="15" fill="#e4e4e7" text-anchor="middle">Apple·taste</text>
    </g>
  </g>

  <!-- right side: AI infra constellation -->
  <g transform="translate(820 58)" fill="none">
    <g stroke="rgba(199,255,58,0.45)" stroke-width="1.2">
      <line x1="40" y1="60" x2="160" y2="36"/>
      <line x1="40" y1="60" x2="170" y2="108"/>
      <line x1="160" y1="36" x2="280" y2="64"/>
      <line x1="170" y1="108" x2="280" y2="64"/>
      <line x1="280" y1="64" x2="370" y2="32"/>
      <line x1="280" y1="64" x2="380" y2="106"/>
      <line x1="280" y1="64" x2="360" y2="170"/>
    </g>
    <!-- node labels -->
    <g font-family="JetBrains Mono, monospace" font-size="8">
      <circle cx="40" cy="60" r="6" fill="#22e6ff"/>
      <text x="40" y="48" fill="#22e6ff" text-anchor="middle">you</text>
      <circle cx="160" cy="36" r="5" fill="#c7ff3a"/>
      <text x="160" y="24" fill="#a1a1aa" text-anchor="middle">cli</text>
      <circle cx="170" cy="108" r="5" fill="#c7ff3a"/>
      <text x="170" y="124" fill="#a1a1aa" text-anchor="middle">web</text>
      <circle cx="280" cy="64" r="10" fill="#ff3ec9" filter="url(#softGlow)"/>
      <text x="290" y="55" fill="#ff3ec9">pool</text>
      <circle cx="370" cy="32" r="5" fill="#fbbf24"/>
      <text x="378" y="28" fill="#a1a1aa">Claude</text>
      <circle cx="380" cy="106" r="5" fill="#34d399"/>
      <text x="388" y="110" fill="#a1a1aa">GPT</text>
      <circle cx="360" cy="170" r="5" fill="#a78bfa"/>
      <text x="368" y="174" fill="#a1a1aa">Gemini</text>
    </g>
    <text x="220" y="220" fill="#71717a" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">113+ models · one endpoint · zero lock-in</text>

    <!-- bottom hint -->
    <text x="220" y="248" fill="#c7ff3a" font-family="Space Grotesk, sans-serif" font-style="italic" font-size="14" text-anchor="middle" opacity="0.85">
      use freely · do no harm
    </text>
  </g>

  <!-- watermark -->
  <text x="1240" y="346" text-anchor="end" fill="#71717a" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="3">
    GUANXIAOL · OPEN SOURCE · MIT
  </text>
</svg>
