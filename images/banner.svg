<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="guanxiaol — AI Infrastructure builder and open-source hacker">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070a"/>
      <stop offset="100%" stop-color="#0c0f14"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#c7ff3a" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#c7ff3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#22e6ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22e6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="55%" cy="120%" r="80%">
      <stop offset="0%" stop-color="#ff3ec9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff3ec9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c7ff3a"/>
      <stop offset="55%" stop-color="#22e6ff"/>
      <stop offset="100%" stop-color="#ff3ec9"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>
  <rect width="1280" height="360" fill="url(#glow1)"/>
  <rect width="1280" height="360" fill="url(#glow2)"/>
  <rect width="1280" height="360" fill="url(#glow3)"/>

  <!-- corner brackets -->
  <g stroke="rgba(199,255,58,0.5)" stroke-width="1" fill="none">
    <path d="M40 40 H 64 M40 40 V 64"/>
    <path d="M1240 40 H 1216 M1240 40 V 64"/>
    <path d="M40 320 H 64 M40 320 V 296"/>
    <path d="M1240 320 H 1216 M1240 320 V 296"/>
  </g>

  <!-- status pill -->
  <g transform="translate(60 70)">
    <rect width="320" height="22" rx="11" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="14" cy="11" r="3" fill="#c7ff3a"/>
    <text x="26" y="15" fill="#a1a1aa" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="2">
      ACTIVE · BUILDING IN PUBLIC · BASED IN CHINA
    </text>
  </g>

  <!-- big handle -->
  <text x="60" y="186" fill="url(#title)" font-family="Space Grotesk, Inter, sans-serif" font-weight="800" font-size="112" letter-spacing="-4">guanxiaol</text>

  <!-- tagline en -->
  <text x="60" y="230" fill="#e4e4e7" font-family="Inter, sans-serif" font-weight="500" font-size="22" letter-spacing="0.2">
    AI Infrastructure · LLM Plumbing · Tools for Cyclists
  </text>
  <!-- tagline zh -->
  <text x="60" y="260" fill="#a1a1aa" font-family="Inter, sans-serif" font-weight="400" font-size="18" letter-spacing="0.2">
    AI 基础设施 · LLM 工具链 · 给骑友的数据工具
  </text>

  <!-- feature chips -->
  <g transform="translate(60 290)" font-family="JetBrains Mono, monospace" font-size="11">
    <g>
      <rect width="120" height="22" rx="11" fill="rgba(199,255,58,0.10)" stroke="rgba(199,255,58,0.35)"/>
      <text x="60" y="15" fill="#c7ff3a" text-anchor="middle">WindsurfPoolAPI</text>
    </g>
    <g transform="translate(132 0)">
      <rect width="110" height="22" rx="11" fill="rgba(34,230,255,0.10)" stroke="rgba(34,230,255,0.35)"/>
      <text x="55" y="15" fill="#22e6ff" text-anchor="middle">GarminPoster</text>
    </g>
    <g transform="translate(254 0)">
      <rect width="118" height="22" rx="11" fill="rgba(255,62,201,0.10)" stroke="rgba(255,62,201,0.35)"/>
      <text x="59" y="15" fill="#ff3ec9" text-anchor="middle">pomelo-context</text>
    </g>
    <g transform="translate(384 0)">
      <rect width="135" height="22" rx="11" fill="rgba(255,174,58,0.10)" stroke="rgba(255,174,58,0.35)"/>
      <text x="67" y="15" fill="#ffae3a" text-anchor="middle">copilot-feedback-loop</text>
    </g>
  </g>

  <!-- right side: stylised "infra" + bike route -->
  <g transform="translate(800 60)" fill="none">
    <!-- network nodes (AI infra metaphor) -->
    <g stroke="rgba(199,255,58,0.5)" stroke-width="1.5">
      <line x1="50" y1="60" x2="160" y2="40"/>
      <line x1="50" y1="60" x2="170" y2="100"/>
      <line x1="160" y1="40" x2="280" y2="60"/>
      <line x1="170" y1="100" x2="280" y2="60"/>
      <line x1="280" y1="60" x2="360" y2="30"/>
      <line x1="280" y1="60" x2="370" y2="100"/>
      <line x1="280" y1="60" x2="350" y2="160"/>
    </g>
    <g>
      <circle cx="50" cy="60" r="6" fill="#22e6ff"/>
      <circle cx="160" cy="40" r="5" fill="#c7ff3a"/>
      <circle cx="170" cy="100" r="5" fill="#c7ff3a"/>
      <circle cx="280" cy="60" r="9" fill="#ff3ec9"/>
      <circle cx="360" cy="30" r="5" fill="#c7ff3a"/>
      <circle cx="370" cy="100" r="5" fill="#c7ff3a"/>
      <circle cx="350" cy="160" r="5" fill="#c7ff3a"/>
    </g>
    <text x="50" y="50" font-family="JetBrains Mono, monospace" font-size="9" fill="#22e6ff">user</text>
    <text x="288" y="55" font-family="JetBrains Mono, monospace" font-size="9" fill="#ff3ec9">pool</text>
    <text x="290" y="190" font-family="JetBrains Mono, monospace" font-size="9" fill="#a1a1aa" text-anchor="middle">113+ models · GPT · Claude · Gemini · Grok · Kimi</text>

    <!-- mini bike route below the network — symbol for GarminPoster -->
    <g transform="translate(0 220)">
      <path d="M 0 30 C 30 0, 80 0, 110 25 S 200 50, 280 30 S 380 0, 420 25"
            stroke="#c7ff3a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
      <circle cx="0" cy="30" r="5" fill="#c7ff3a"/>
      <circle cx="420" cy="25" r="5" fill="#ff3ec9"/>
      <text x="0" y="60" font-family="JetBrains Mono, monospace" font-size="9" fill="#71717a">→ rides as posters</text>
    </g>
  </g>

  <!-- watermark -->
  <text x="1240" y="346" text-anchor="end" fill="#71717a" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="3">
    GUANXIAOL · OPEN SOURCE
  </text>
</svg>
