name: Generate contribution snake

on:
  schedule:
    # every 6 hours
    - cron: '0 */6 * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake (light + dark) and dotted dark
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: guanxiaol
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake-dots-dark.svg?palette=github-dark&color_snake=orange&color_dots=#1f1f1f,#c7ff3a,#22e6ff,#ff3ec9,#ffae3a

      - name: Publish to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
